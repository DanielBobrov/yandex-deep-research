services:
  provisioner:
    build:
      context: ./provisioner
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
    container_name: yandex-deep-research-provisioner
    volumes:
    - ~/.kube/config:/root/.kube/config:ro
    environment:
    - K8S_NAMESPACE=yandex-deep-research
    - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    - SKILLS_HOST_PATH=${YANDEX_DEEP_RESEARCH_ROOT}/skills
    - THREADS_HOST_PATH=${YANDEX_DEEP_RESEARCH_ROOT}/backend/.yandex-deep-research/threads
    - KUBECONFIG_PATH=/root/.kube/config
    - NODE_HOST=host.docker.internal
    - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
    - ../.env
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - yandex-deep-research-dev
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8002/health
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      target: dev
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: yandex-deep-research-gateway
    command: sh -c "{ cd backend && (uv sync || (echo '[startup] uv sync failed; recreating
      .venv and retrying once' && uv venv --allow-existing .venv && uv sync)) && PYTHONPATH=.
      uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-include='*.yaml
      .env'; } > /app/logs/gateway.log 2>&1"
    volumes:
    - ../backend/:/app/backend/
    - gateway-venv:/app/backend/.venv
    - ../config.yaml:/app/config.yaml
    - ../extensions_config.json:/app/extensions_config.json
    - ../skills:/app/skills
    - ../logs:/app/logs
    - gateway-uv-cache:/root/.cache/uv
    - /var/run/docker.sock:/var/run/docker.sock
    - type: bind
      source: ${HOME:?HOME must be set}/.claude
      target: /root/.claude
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: ${HOME:?HOME must be set}/.codex
      target: /root/.codex
      read_only: true
      bind:
        create_host_path: true
    working_dir: /app
    environment:
    - CI=true
    - YANDEX_DEEP_RESEARCH_HOME=/app/backend/.yandex-deep-research
    - YANDEX_DEEP_RESEARCH_CHANNELS_LANGGRAPH_URL=${YANDEX_DEEP_RESEARCH_CHANNELS_LANGGRAPH_URL:-http://langgraph:2024}
    - YANDEX_DEEP_RESEARCH_CHANNELS_GATEWAY_URL=${YANDEX_DEEP_RESEARCH_CHANNELS_GATEWAY_URL:-http://gateway:8001}
    - YANDEX_DEEP_RESEARCH_HOST_BASE_DIR=${YANDEX_DEEP_RESEARCH_ROOT}/backend/.yandex-deep-research
    - YANDEX_DEEP_RESEARCH_HOST_SKILLS_PATH=${YANDEX_DEEP_RESEARCH_ROOT}/skills
    - YANDEX_DEEP_RESEARCH_SANDBOX_HOST=host.docker.internal
    env_file:
    - ../.env
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - yandex-deep-research-dev
    restart: unless-stopped
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      target: dev
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: yandex-deep-research-langgraph
    command: sh -c "cd backend && { (uv sync || (echo '[startup] uv sync failed; recreating
      .venv and retrying once' && uv venv --allow-existing .venv && uv sync)) && allow_blocking=''
      && if [ \"\${LANGGRAPH_ALLOW_BLOCKING:-0}\" = '1' ]; then allow_blocking='--allow-blocking';
      fi && uv run langgraph dev --no-browser \${allow_blocking} --host 0.0.0.0 --port
      2024 --n-jobs-per-worker \${LANGGRAPH_JOBS_PER_WORKER:-10}; } > /app/logs/langgraph.log
      2>&1"
    volumes:
    - ../backend/:/app/backend/
    - langgraph-venv:/app/backend/.venv
    - ../config.yaml:/app/config.yaml
    - ../extensions_config.json:/app/extensions_config.json
    - ../skills:/app/skills
    - ../logs:/app/logs
    - langgraph-uv-cache:/root/.cache/uv
    - /var/run/docker.sock:/var/run/docker.sock
    - type: bind
      source: ${HOME:?HOME must be set}/.claude
      target: /root/.claude
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: ${HOME:?HOME must be set}/.codex
      target: /root/.codex
      read_only: true
      bind:
        create_host_path: true
    working_dir: /app
    environment:
    - CI=true
    - YANDEX_DEEP_RESEARCH_HOME=/app/backend/.yandex-deep-research
    - YANDEX_DEEP_RESEARCH_HOST_BASE_DIR=${YANDEX_DEEP_RESEARCH_ROOT}/backend/.yandex-deep-research
    - YANDEX_DEEP_RESEARCH_HOST_SKILLS_PATH=${YANDEX_DEEP_RESEARCH_ROOT}/skills
    - YANDEX_DEEP_RESEARCH_SANDBOX_HOST=host.docker.internal
    env_file:
    - ../.env
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - yandex-deep-research-dev
    restart: unless-stopped
volumes:
  gateway-venv: null
  langgraph-venv: null
  gateway-uv-cache: null
  langgraph-uv-cache: null
networks:
  yandex-deep-research-dev:
    driver: bridge
    ipam:
      config:
      - subnet: 192.168.200.0/24
