services:
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: yandex-deep-research-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app
      --host 0.0.0.0 --port 8001 --workers ${GATEWAY_WORKERS:-4}"
    volumes:
    - ${YANDEX_DEEP_RESEARCH_CONFIG_PATH}:/app/backend/config.yaml:ro
    - ${YANDEX_DEEP_RESEARCH_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
    - ../skills:/app/skills:ro
    - ${YANDEX_DEEP_RESEARCH_HOME}:/app/backend/.yandex-deep-research
    - ${YANDEX_DEEP_RESEARCH_DOCKER_SOCKET}:/var/run/docker.sock
    - type: bind
      source: ${HOME:?HOME must be set}/.claude
      target: /root/.claude
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: ${HOME:?HOME must be set}/.codex
      target: /root/.codex
      read_only: true
      bind:
        create_host_path: true
    working_dir: /app
    environment:
    - CI=true
    - YANDEX_DEEP_RESEARCH_HOME=/app/backend/.yandex-deep-research
    - YANDEX_DEEP_RESEARCH_CONFIG_PATH=/app/backend/config.yaml
    - YANDEX_DEEP_RESEARCH_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
    - YANDEX_DEEP_RESEARCH_CHANNELS_LANGGRAPH_URL=${YANDEX_DEEP_RESEARCH_CHANNELS_LANGGRAPH_URL:-http://langgraph:2024}
    - YANDEX_DEEP_RESEARCH_CHANNELS_GATEWAY_URL=${YANDEX_DEEP_RESEARCH_CHANNELS_GATEWAY_URL:-http://gateway:8001}
    - YANDEX_DEEP_RESEARCH_HOST_BASE_DIR=${YANDEX_DEEP_RESEARCH_HOME}
    - YANDEX_DEEP_RESEARCH_HOST_SKILLS_PATH=${YANDEX_DEEP_RESEARCH_REPO_ROOT}/skills
    - YANDEX_DEEP_RESEARCH_SANDBOX_HOST=host.docker.internal
    env_file:
    - ../.env
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - yandex-deep-research
    restart: unless-stopped
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: yandex-deep-research-langgraph
    command: sh -c 'cd /app/backend && args="--no-browser --no-reload --host 0.0.0.0
      --port 2024 --n-jobs-per-worker $${LANGGRAPH_JOBS_PER_WORKER:-10}" && if [ "$${LANGGRAPH_ALLOW_BLOCKING:-0}"
      = "1" ]; then args="$$args --allow-blocking"; fi && uv run langgraph dev $$args'
    volumes:
    - ${YANDEX_DEEP_RESEARCH_CONFIG_PATH}:/app/backend/config.yaml:ro
    - ${YANDEX_DEEP_RESEARCH_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
    - ${YANDEX_DEEP_RESEARCH_HOME}:/app/backend/.yandex-deep-research
    - ../skills:/app/skills:ro
    - ../backend/.langgraph_api:/app/backend/.langgraph_api
    - ${YANDEX_DEEP_RESEARCH_DOCKER_SOCKET}:/var/run/docker.sock
    - type: bind
      source: ${HOME:?HOME must be set}/.claude
      target: /root/.claude
      read_only: true
      bind:
        create_host_path: true
    - type: bind
      source: ${HOME:?HOME must be set}/.codex
      target: /root/.codex
      read_only: true
      bind:
        create_host_path: true
    environment:
    - CI=true
    - YANDEX_DEEP_RESEARCH_HOME=/app/backend/.yandex-deep-research
    - YANDEX_DEEP_RESEARCH_CONFIG_PATH=/app/backend/config.yaml
    - YANDEX_DEEP_RESEARCH_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
    - YANDEX_DEEP_RESEARCH_HOST_BASE_DIR=${YANDEX_DEEP_RESEARCH_HOME}
    - YANDEX_DEEP_RESEARCH_HOST_SKILLS_PATH=${YANDEX_DEEP_RESEARCH_REPO_ROOT}/skills
    - YANDEX_DEEP_RESEARCH_SANDBOX_HOST=host.docker.internal
    env_file:
    - ../.env
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - yandex-deep-research
    restart: unless-stopped
  provisioner:
    build:
      context: ./provisioner
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: yandex-deep-research-provisioner
    volumes:
    - ~/.kube/config:/root/.kube/config:ro
    environment:
    - K8S_NAMESPACE=yandex-deep-research
    - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
    - SKILLS_HOST_PATH=${YANDEX_DEEP_RESEARCH_REPO_ROOT}/skills
    - THREADS_HOST_PATH=${YANDEX_DEEP_RESEARCH_HOME}/threads
    - KUBECONFIG_PATH=/root/.kube/config
    - NODE_HOST=host.docker.internal
    - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
    - ../.env
    extra_hosts:
    - host.docker.internal:host-gateway
    networks:
    - yandex-deep-research
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8002/health
      interval: 10s
      timeout: 5s
      retries: 6
networks:
  yandex-deep-research:
    driver: bridge
